syntax = "proto3";

package queue;

option go_package = "github.com/shreyasrajiv327/APIBench/proto;proto";

message Empty {}

message Message {
  string id = 1;
  bytes payload = 2;
  string status = 3;
  string created_at = 4;
}

message PublishRequest {
  bytes payload = 1;
}

message AckRequest {
  string id = 1;
}

service QueueService {
  rpc Publish(PublishRequest) returns (Message);
  rpc Poll(Empty) returns (Message);
  rpc Ack(AckRequest) returns (Empty);
  rpc Nack(AckRequest) returns (Empty);
}